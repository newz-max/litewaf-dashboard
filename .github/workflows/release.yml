name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version to publish. Leave empty to use VERSION."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Validate tag version
        run: |
          INPUT_VERSION="${{ inputs.release_version }}"
          RELEASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          APP_VERSION="$(node -p "require('./package.json').version")"
          TARGET_VERSION="${INPUT_VERSION:-${RELEASE_VERSION}}"
          if [ -z "${RELEASE_VERSION}" ]; then
            echo "Cannot read release version from VERSION" >&2
            exit 1
          fi
          if [ -z "${TARGET_VERSION}" ]; then
            echo "Cannot determine target release version" >&2
            exit 1
          fi
          if [ "${APP_VERSION}" != "${TARGET_VERSION}" ]; then
            echo "Package version ${APP_VERSION} does not match target version ${TARGET_VERSION}" >&2
            exit 1
          fi
          if [ "${RELEASE_VERSION}" != "${TARGET_VERSION}" ]; then
            echo "VERSION ${RELEASE_VERSION} does not match target version ${TARGET_VERSION}" >&2
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" != "${TARGET_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match target version ${TARGET_VERSION}" >&2
            exit 1
          fi
          echo "LITEWAF_VERSION=${TARGET_VERSION}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: npm ci

      - name: Build static assets
        run: npm run build

      - name: Collect fallback deployment files
        run: |
          mkdir -p release/litewaf-dashboard
          cp -r dist release/litewaf-dashboard/
          cp nginx.conf README.md LICENSE release/litewaf-dashboard/
          cat > release/litewaf-dashboard/VERSION <<EOF
          ${LITEWAF_VERSION}
          EOF
          cat > release/litewaf-dashboard/RELEASE_PACKAGE.md <<'EOF'
          # LiteWaf Dashboard release package

          This package is a non-Docker fallback deployment asset. It contains the
          prebuilt static frontend files under dist/ plus the reference nginx.conf.
          It does not replace or modify the Docker image publishing path.

          Serve dist/ with any static web server and proxy /api/ requests to the
          LiteWaf API service.
          EOF

      - name: Pack release asset
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/litewaf-dashboard-${LITEWAF_VERSION}.tar.gz" -C release litewaf-dashboard
          cd release-assets
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        run: |
          if gh release view "${LITEWAF_VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${LITEWAF_VERSION}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${LITEWAF_VERSION}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${LITEWAF_VERSION}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
