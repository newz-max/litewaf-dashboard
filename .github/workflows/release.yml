name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Validate tag version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          RELEASE_VERSION="$(tr -d '[:space:]' < VERSION)"
          APP_VERSION="$(node -p "require('./package.json').version")"
          if [ -z "${RELEASE_VERSION}" ]; then
            echo "Cannot read release version from VERSION" >&2
            exit 1
          fi
          if [ "${TAG_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${RELEASE_VERSION}" >&2
            exit 1
          fi
          if [ "${APP_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "Package version ${APP_VERSION} does not match VERSION ${RELEASE_VERSION}" >&2
            exit 1
          fi
          echo "LITEWAF_VERSION=${RELEASE_VERSION}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: npm ci

      - name: Build static assets
        run: npm run build

      - name: Collect fallback deployment files
        run: |
          mkdir -p release/litewaf-dashboard
          cp -r dist release/litewaf-dashboard/
          cp nginx.conf README.md LICENSE release/litewaf-dashboard/
          cat > release/litewaf-dashboard/VERSION <<EOF
          ${LITEWAF_VERSION}
          EOF
          cat > release/litewaf-dashboard/RELEASE_PACKAGE.md <<'EOF'
          # LiteWaf Dashboard release package

          This package is a non-Docker fallback deployment asset. It contains the
          prebuilt static frontend files under dist/ plus the reference nginx.conf.
          It does not replace or modify the Docker image publishing path.

          Serve dist/ with any static web server and proxy /api/ requests to the
          LiteWaf API service.
          EOF

      - name: Pack release asset
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/litewaf-dashboard-${GITHUB_REF_NAME}.tar.gz" -C release litewaf-dashboard
          cd release-assets
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
